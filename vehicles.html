<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Registry - TransitOps</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .data-table th, .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--bg-tertiary);
        }
        .data-table th {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        /* Simple Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: var(--border-radius-md);
            width: 400px;
            max-width: 90%;
            border: 1px solid var(--bg-tertiary);
        }
        .modal h3 { margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); }
        .form-control { width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--bg-tertiary); border-radius: 4px; color: white; }
        .error-message { color: var(--status-danger); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span>Transit</span>Ops
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    Dashboard
                </a>
                <a href="vehicles.html" class="nav-item active">
                    <span class="nav-icon">🚚</span>
                    Fleet
                </a>
                <a href="drivers.html" class="nav-item">
                    <span class="nav-icon">🧑‍✈️</span>
                    Drivers
                </a>
                <a href="trips.html" class="nav-item">
                    <span class="nav-icon">🗺️</span>
                    Trips
                </a>
                <a href="maintenance.html" class="nav-item">
                    <span class="nav-icon">🔧</span>
                    Maintenance
                </a>
                <a href="fuel.html" class="nav-item">
                    <span class="nav-icon">⛽</span>
                    Fuel & Expenses
                </a>
                <a href="analytics.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    Analytics
                </a>
                <a href="settings.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <span class="user-name">Raven K.</span>
                        <div class="avatar">RK</div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="content-area">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Vehicle Registry</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">+ Add Vehicle</button>
                </div>
                
                <div style="background: var(--bg-secondary); border-radius: var(--border-radius-md); border: 1px solid var(--bg-tertiary); overflow: hidden;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Reg. No. (Unique)</th>
                                <th>Name/Model</th>
                                <th>Type</th>
                                <th>Capacity</th>
                                <th>Odometer</th>
                                <th>Acq. Cost</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="vehicleTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Vehicle Modal -->
    <div class="modal-overlay" id="addVehicleModal">
        <div class="modal">
            <h3>Add New Vehicle</h3>
            <form id="addVehicleForm">
                <div class="form-group">
                    <label>Registration Number</label>
                    <input type="text" id="regNo" class="form-control" required placeholder="e.g. GJ01AB1234">
                    <div class="error-message" id="regError"></div>
                </div>
                <div class="form-group">
                    <label>Name / Model</label>
                    <input type="text" id="name" class="form-control" required placeholder="e.g. VAN-10">
                </div>
                <div class="form-group">
                    <label>Capacity (kg)</label>
                    <input type="number" id="capacity" class="form-control" required placeholder="e.g. 500">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeAddModal()" style="background: transparent; border: 1px solid var(--bg-tertiary); color: white;">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Vehicle</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/mock-data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function renderTable() {
            const tbody = document.getElementById('vehicleTableBody');
            const state = window.TransitStore.getState();
            
            tbody.innerHTML = state.vehicles.map(v => `
                <tr>
                    <td style="font-family: monospace;">${v.regNo}</td>
                    <td>${v.name}</td>
                    <td>${v.type || 'Van'}</td>
                    <td>${v.capacity}</td>
                    <td>${v.odometer || '0'}</td>
                    <td>${v.cost || '-'}</td>
                    <td><span class="badge ${getBadgeClass(v.status)}">${v.status}</span></td>
                </tr>
            `).join('');
        }

        // Listen for global state changes to re-render
        window.addEventListener('stateChanged', renderTable);
        
        // Initial render
        renderTable();

        // Modal Logic
        const modal = document.getElementById('addVehicleModal');
        const form = document.getElementById('addVehicleForm');
        const regError = document.getElementById('regError');

        function openAddModal() {
            form.reset();
            regError.style.display = 'none';
            modal.style.display = 'flex';
        }

        function closeAddModal() {
            modal.style.display = 'none';
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const regNo = document.getElementById('regNo').value.trim();
            const name = document.getElementById('name').value.trim();
            const capacity = document.getElementById('capacity').value.trim();

            try {
                window.TransitStore.addVehicle({
                    regNo,
                    name,
                    type: 'Van', // Simplified for scaffold
                    capacity: `${capacity} kg`,
                    capacityVal: parseInt(capacity),
                    status: 'Available',
                    odometer: '0',
                    cost: '-'
                });
                closeAddModal();
            } catch (err) {
                regError.textContent = err.message; // Displays: "Registration number ... already exists."
                regError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
