<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicles - Transit Ops</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        Transit Ops
      </div>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="vehicles.html" class="active">Vehicles</a></li>
        <li><a href="drivers.html">Drivers</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="maintenance.html">Maintenance</a></li>
        <li><a href="expenses.html">Expenses/Fuel</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="topbar">
        <h2>Vehicle Registry</h2>
        <div class="d-flex align-items-center">
          <button id="theme-toggle" class="btn btn-secondary" style="margin-right: 15px;">Toggle Dark Mode</button>
          <button class="btn btn-primary" id="add-vehicle-btn">Add Vehicle</button>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Reg Number</th>
              <th>Model</th>
              <th>Type</th>
              <th>Load Capacity</th>
              <th>Odometer</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="vehicle-table-body">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tbody = document.getElementById('vehicle-table-body');
      
      mockData.vehicles.forEach(vehicle => {
        const tr = document.createElement('tr');
        const badgeClass = getStatusBadgeClass(vehicle.status);
        
        tr.innerHTML = `
          <td>${vehicle.id}</td>
          <td>${vehicle.regNumber}</td>
          <td>${vehicle.model}</td>
          <td>${vehicle.type}</td>
          <td>${vehicle.loadCapacity}</td>
          <td>${vehicle.odometer}</td>
          <td><span class="badge ${badgeClass}">${vehicle.status}</span></td>
        `;
        tbody.appendChild(tr);
      });
    });
  </script>
</body>
</html>
