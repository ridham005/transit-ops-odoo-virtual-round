<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Dispatcher - TransitOps</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .split-layout {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }
        .dispatcher-panel {
            flex: 1;
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--bg-tertiary);
        }
        .live-board {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;}
        .form-control { width: 100%; padding: 0.75rem; background: var(--bg-primary); border: 1px solid var(--bg-tertiary); border-radius: 4px; color: white; }
        .form-control:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .capacity-warning {
            border: 1px solid var(--status-danger);
            background: var(--status-danger-bg);
            color: var(--status-danger);
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        .trip-card {
            background: var(--bg-secondary);
            border: 1px dashed var(--bg-tertiary);
            padding: 1rem;
            border-radius: var(--border-radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .trip-info h4 { margin-bottom: 0.25rem; font-weight: 500; }
        .trip-info p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .trip-actions { display: flex; gap: 0.5rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo"><span>Transit</span>Ops</div></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
                <a href="vehicles.html" class="nav-item"><span class="nav-icon">🚚</span>Fleet</a>
                <a href="drivers.html" class="nav-item"><span class="nav-icon">🧑‍✈️</span>Drivers</a>
                <a href="trips.html" class="nav-item active"><span class="nav-icon">🗺️</span>Trips</a>
                <a href="maintenance.html" class="nav-item"><span class="nav-icon">🔧</span>Maintenance</a>
                <a href="fuel.html" class="nav-item"><span class="nav-icon">⛽</span>Fuel & Expenses</a>
                <a href="analytics.html" class="nav-item"><span class="nav-icon">📈</span>Analytics</a>
                <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span>Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-bar"><span class="search-icon">🔍</span><input type="text" placeholder="Search..."></div>
                <div class="topbar-right"><div class="user-profile"><span class="user-name">Raven K.</span><div class="avatar">RK</div></div></div>
            </header>

            <div class="content-area">
                <h2>Trip Dispatcher</h2>
                
                <div class="split-layout">
                    <!-- Create Trip Form -->
                    <div class="dispatcher-panel">
                        <h3 style="margin-bottom: 1.5rem;">Create Trip</h3>
                        <form id="dispatchForm">
                            <div class="form-group">
                                <label>Source</label>
                                <input type="text" id="source" class="form-control" required placeholder="e.g. Gandhinagar Depot">
                            </div>
                            <div class="form-group">
                                <label>Destination</label>
                                <input type="text" id="destination" class="form-control" required placeholder="e.g. Ahmedabad Hub">
                            </div>
                            <div class="form-group">
                                <label>Vehicle (Available Only)</label>
                                <select id="vehicleSelect" class="form-control" required>
                                    <!-- Populated by JS -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Driver (Available Only)</label>
                                <select id="driverSelect" class="form-control" required>
                                    <!-- Populated by JS -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Cargo Weight (kg)</label>
                                <input type="number" id="cargoWeight" class="form-control" required placeholder="e.g. 700">
                            </div>
                            
                            <div id="capacityWarning" class="capacity-warning">
                                Vehicle Capacity: <span id="vCap"></span> kg | Cargo Weight: <span id="cWeight"></span> kg<br>
                                <strong>X Exceeded by <span id="excWeight"></span> kg — dispatch blocked</strong>
                            </div>
                            
                            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                                <button type="submit" id="dispatchBtn" class="btn btn-primary" style="flex: 1;">Dispatch</button>
                                <button type="button" class="btn" style="flex: 1; background: transparent; border: 1px solid var(--bg-tertiary); color: white;" onclick="document.getElementById('dispatchForm').reset(); validateCapacity();">Cancel</button>
                            </div>
                        </form>
                    </div>
                    
                    <!-- Live Board -->
                    <div class="live-board">
                        <h3 style="margin-bottom: 0.5rem;">Live Board</h3>
                        <div id="tripsContainer">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/mock-data.js"></script>
    <script src="js/app.js"></script>
    <script>
        const vehicleSelect = document.getElementById('vehicleSelect');
        const driverSelect = document.getElementById('driverSelect');
        const cargoWeightInput = document.getElementById('cargoWeight');
        const capacityWarning = document.getElementById('capacityWarning');
        const dispatchBtn = document.getElementById('dispatchBtn');
        
        function updateDropdowns() {
            const state = window.TransitStore.getState();
            
            // Populate Vehicles (Available Only)
            const availableVehicles = state.vehicles.filter(v => v.status === 'Available');
            vehicleSelect.innerHTML = '<option value="">Select a vehicle...</option>' + 
                availableVehicles.map(v => `<option value="${v.name}" data-cap="${v.capacityVal}">${v.name} - ${v.capacity}</option>`).join('');
                
            // Populate Drivers (Available & Not Expired)
            const today = new Date();
            const availableDrivers = state.drivers.filter(d => {
                if (d.status !== 'Available') return false;
                const expiryDate = new Date(d.expiry);
                return expiryDate >= today;
            });
            driverSelect.innerHTML = '<option value="">Select a driver...</option>' + 
                availableDrivers.map(d => `<option value="${d.name}">${d.name} (${d.category})</option>`).join('');
        }

        function validateCapacity() {
            const selectedOpt = vehicleSelect.options[vehicleSelect.selectedIndex];
            if (!selectedOpt || selectedOpt.value === "") {
                capacityWarning.style.display = 'none';
                dispatchBtn.disabled = false;
                return;
            }
            
            const maxCap = parseInt(selectedOpt.getAttribute('data-cap'));
            const weight = parseInt(cargoWeightInput.value) || 0;
            
            if (weight > maxCap) {
                document.getElementById('vCap').textContent = maxCap;
                document.getElementById('cWeight').textContent = weight;
                document.getElementById('excWeight').textContent = weight - maxCap;
                capacityWarning.style.display = 'block';
                dispatchBtn.disabled = true;
            } else {
                capacityWarning.style.display = 'none';
                dispatchBtn.disabled = false;
            }
        }

        vehicleSelect.addEventListener('change', validateCapacity);
        cargoWeightInput.addEventListener('input', validateCapacity);
        
        document.getElementById('dispatchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (dispatchBtn.disabled) return;
            
            const source = document.getElementById('source').value;
            const dest = document.getElementById('destination').value;
            const vehicle = vehicleSelect.value;
            const driver = driverSelect.value;
            const weight = cargoWeightInput.value;
            
            const newTripId = 'TR' + Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            
            // Push to mock-data store
            const trip = {
                id: newTripId,
                vehicle,
                driver,
                status: 'Draft',
                eta: 'Calculating...',
                source,
                dest: dest,
                cargoWeight: weight
            };
            
            // Force state update natively
            window.TransitStore.getState().trips.push(trip);
            window.TransitStore.dispatchTrip(newTripId, vehicle, driver, weight);
            
            document.getElementById('dispatchForm').reset();
            validateCapacity();
        });

        function renderTrips() {
            const container = document.getElementById('tripsContainer');
            const state = window.TransitStore.getState();
            
            // Sort to show active first
            const sortedTrips = [...state.trips].sort((a,b) => {
                if(a.status === 'Dispatched' && b.status !== 'Dispatched') return -1;
                return 0;
            });
            
            container.innerHTML = sortedTrips.map(t => {
                let actionButtons = '';
                if (t.status === 'Dispatched') {
                    actionButtons = `
                        <button class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;" onclick="completeTrip('${t.id}')">Complete</button>
                        <button class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; background: transparent; border: 1px solid var(--status-danger); color: var(--status-danger);" onclick="cancelTrip('${t.id}')">Cancel</button>
                    `;
                }
                
                return `
                <div class="trip-card">
                    <div class="trip-info">
                        <h4>${t.id} <span style="font-size: 0.8rem; color: var(--text-secondary); font-weight: normal; margin-left: 0.5rem;">${t.vehicle} / ${t.driver}</span></h4>
                        <p>${t.source} &rarr; ${t.dest}</p>
                        <span class="badge ${getBadgeClass(t.status)}">${t.status}</span>
                    </div>
                    <div class="trip-actions">
                        ${actionButtons}
                    </div>
                </div>
                `;
            }).join('');
        }

        window.completeTrip = function(id) {
            if(confirm("Mark this trip as completed? (Odometer and Fuel logs should be recorded)")) {
                window.TransitStore.completeTrip(id);
            }
        };

        window.cancelTrip = function(id) {
            if(confirm("Cancel this dispatched trip?")) {
                window.TransitStore.cancelTrip(id);
            }
        };

        // Listen for global state changes to re-render
        window.addEventListener('stateChanged', () => {
            updateDropdowns();
            renderTrips();
        });
        
        // Initial setup
        updateDropdowns();
        renderTrips();
    </script>
</body>
</html>
