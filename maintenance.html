<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance - Transit Ops</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        Transit Ops
      </div>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="vehicles.html">Vehicles</a></li>
        <li><a href="drivers.html">Drivers</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="maintenance.html" class="active">Maintenance</a></li>
        <li><a href="expenses.html">Expenses/Fuel</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="topbar">
        <h2>Maintenance Log</h2>
        <div class="d-flex align-items-center">
          <button id="theme-toggle" class="btn btn-secondary" style="margin-right: 15px;">Toggle Dark Mode</button>
        </div>
      </div>

      <div class="table-container" style="padding: 20px;">
        <h3 class="mb-3">Log Maintenance Entry</h3>
        <form id="maintenanceForm" style="max-width: 500px;">
          <div class="form-group">
            <label>Vehicle</label>
            <select id="maint-vehicle-select" class="form-control" required>
              <option value="">Select Vehicle</option>
            </select>
          </div>
          <div class="form-group">
            <label>Issue Description</label>
            <textarea class="form-control" rows="3" required placeholder="Describe the issue"></textarea>
          </div>
          <div class="form-group">
            <label>Cost</label>
            <input type="number" class="form-control" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select class="form-control" required>
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Submit Log</button>
        </form>
      </div>
    </main>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const vehicleSelect = document.getElementById('maint-vehicle-select');
      mockData.vehicles.forEach(v => {
        const option = document.createElement('option');
        option.value = v.id;
        option.textContent = `${v.id} - ${v.regNumber}`;
        vehicleSelect.appendChild(option);
      });

      document.getElementById('maintenanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Maintenance log submitted (Mock)');
        this.reset();
      });
    });
  </script>
</body>
</html>
