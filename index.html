<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transit Ops - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body" id="login-page">
  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
    <div class="theme-toggle-icons">
      <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </div>
  </button>

  <!-- Logistics Campus Background -->
  <div id="campus-bg-container">
    <svg id="campus-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <g id="campus-camera">
        <!-- Ground Base -->
        <path d="M-200 400 L500 -100 L1200 400 L500 800 Z" fill="var(--campus-ground)" />
        
        <!-- Main Roads -->
        <path id="main-road" d="M -100 450 L 1100 150" stroke="var(--campus-road)" stroke-width="45" fill="none" />
        <path id="side-road" d="M 450 310 L 750 650" stroke="var(--campus-road)" stroke-width="35" fill="none" />
        
        <!-- Route Pulses -->
        <path id="route-pulse-1" class="route-pulse" d="M -100 450 L 1100 150" stroke="var(--primary-color)" stroke-width="4" fill="none" stroke-dasharray="40 1200" stroke-dashoffset="1200" />
        <path id="route-pulse-2" class="route-pulse" d="M 450 310 L 750 650" stroke="var(--primary-color)" stroke-width="3" fill="none" stroke-dasharray="30 800" stroke-dashoffset="800" />
        
        <!-- Crosswalks (Inspection Area) -->
        <g id="inspection-area">
          <rect x="470" y="340" width="8" height="35" fill="var(--campus-marking)" transform="skewX(-45)" opacity="0.4" class="crosswalk"/>
          <rect x="490" y="330" width="8" height="35" fill="var(--campus-marking)" transform="skewX(-45)" opacity="0.4" class="crosswalk"/>
          <rect x="510" y="320" width="8" height="35" fill="var(--campus-marking)" transform="skewX(-45)" opacity="0.4" class="crosswalk"/>
          <circle cx="530" cy="305" r="4" class="safety-beacon" fill="var(--campus-warning)"/>
          <circle cx="450" cy="365" r="4" class="safety-beacon" fill="var(--campus-warning)"/>
        </g>

        <!-- Fleet Parking & Maintenance Bay -->
        <g id="fleet-parking">
          <rect x="220" y="180" width="160" height="90" rx="4" fill="var(--campus-building-base)" stroke="var(--campus-building-edge)" stroke-width="1.5" transform="skewX(-30) rotate(15)"/>
          <path class="maintenance-bay" d="M 240 190 L 275 190 L 275 225 L 240 225 Z" fill="var(--campus-window)"/>
          <path class="maintenance-bay" d="M 290 190 L 325 190 L 325 225 L 290 225 Z" fill="var(--campus-window)"/>
          <!-- Parked Trucks -->
          <rect class="truck parked-truck" x="270" y="240" width="28" height="12" rx="2" fill="var(--campus-accent)" />
          <rect class="truck parked-truck" x="310" y="250" width="28" height="12" rx="2" fill="var(--campus-accent)" />
        </g>

        <!-- Warehouse & Loading Docks -->
        <g id="warehouse">
          <rect x="550" y="120" width="280" height="160" fill="var(--campus-building-base)" stroke="var(--campus-building-edge)" stroke-width="2" />
          <polygon points="550,120 610,60 890,60 830,120" fill="var(--campus-roof)" />
          <polygon points="830,120 890,60 890,220 830,280" fill="var(--campus-building-side)" />
          
          <!-- Loading Bays -->
          <g id="loading-bays">
            <rect x="570" y="210" width="35" height="45" class="warehouse-bay" fill="var(--campus-window)" />
            <circle cx="587.5" cy="200" r="3" class="warehouse-bay-light" fill="var(--campus-light-off)" />
            
            <rect x="630" y="210" width="35" height="45" class="warehouse-bay" fill="var(--campus-window)" />
            <circle cx="647.5" cy="200" r="3" class="warehouse-bay-light" fill="var(--campus-light-off)" />
            
            <rect x="690" y="210" width="35" height="45" class="warehouse-bay" fill="var(--campus-window)" />
            <circle cx="707.5" cy="200" r="3" class="warehouse-bay-light" fill="var(--campus-light-off)" />
          </g>
        </g>

        <!-- Crane & Containers -->
        <g id="crane-area">
          <rect x="850" y="240" width="90" height="50" fill="var(--campus-container-bg)" class="container-stack" />
          <rect x="870" y="215" width="50" height="25" fill="var(--campus-container-fg)" class="container-top" />
          <path id="crane-arm" class="crane-arm" d="M 820 170 L 950 170" stroke="var(--campus-crane)" stroke-width="5" />
          <rect id="crane-base" x="930" y="170" width="12" height="110" fill="var(--campus-crane)" />
        </g>

        <!-- Office Building & Dispatch -->
        <g id="office-building">
          <rect x="320" y="380" width="140" height="120" fill="var(--campus-building-base)" stroke="var(--campus-building-edge)" stroke-width="1.5" />
          <polygon points="320,380 360,340 500,340 460,380" fill="var(--campus-roof)" />
          <polygon points="460,380 500,340 500,460 460,500" fill="var(--campus-building-side)" />
          
          <!-- Windows -->
          <rect x="335" y="395" width="45" height="30" class="dispatch-window" fill="var(--campus-window)" />
          <rect x="395" y="395" width="45" height="30" class="server-window" fill="var(--campus-window)" />
          <rect x="335" y="445" width="30" height="25" class="office-window" fill="var(--campus-window)" />
          <rect x="380" y="445" width="30" height="25" class="office-window" fill="var(--campus-window)" />
          
          <!-- Security Light -->
          <circle cx="310" cy="420" r="5" class="security-light" fill="var(--campus-light-off)" />
        </g>

        <!-- Dynamic Truck (Docked initially) -->
        <g id="active-truck" class="active-truck" transform="translate(690, 275)">
          <rect x="0" y="0" width="35" height="18" rx="2" class="truck-body" fill="var(--campus-accent)" />
          <rect x="-12" y="2" width="14" height="14" rx="2" fill="var(--campus-truck-cab)" />
          <circle cx="-14" cy="9" r="6" class="truck-headlight" fill="var(--campus-light-off)" />
        </g>

        <!-- Ambient Street Lights -->
        <g id="street-lights">
          <circle cx="120" cy="380" r="10" class="street-light-glow" fill="var(--campus-light-off)" />
          <circle cx="440" cy="290" r="10" class="street-light-glow" fill="var(--campus-light-off)" />
          <circle cx="780" cy="190" r="10" class="street-light-glow" fill="var(--campus-light-off)" />
        </g>
      </g>
    </svg>
  </div>

  <!-- Operations Status Overlay -->
  <div class="ops-status-overlay">
    <div class="ops-clock">
      <span id="current-time">00:00:00</span>
      <span class="ops-weather" id="ops-weather-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </span>
    </div>
    <div class="ops-date" id="current-date">MON, JAN 1</div>
    <div class="ops-ticker">
      <span class="ticker-dot"></span>
      <span id="system-status-msg">System Online</span>
    </div>
  </div>

  <div class="login-card-wrapper">
    <div class="login-card glass-card">
      <div class="glass-highlight"></div>
      <h2 class="mb-3" style="text-align: center; position: relative; z-index: 1;">Transit Ops</h2>
      <div id="login-error" class="login-error" style="display: none;"></div>
      <form id="loginForm" novalidate style="position: relative; z-index: 1;">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control glass-input" placeholder="Enter your email" required>
          <div class="validation-msg">Email is required</div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control glass-input" placeholder="Enter your password" required>
          <div class="validation-msg">Password is required</div>
        </div>
        <div class="form-group" id="role-group">
          <label for="role">Role</label>
          <div class="custom-select-wrapper">
            <input type="hidden" id="role" required>
            <div class="custom-select glass-input">
              <span class="custom-select-trigger">Select Role</span>
              <svg class="dropdown-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div class="custom-options glass-card">
              <div class="custom-option" data-value="Fleet Manager">Fleet Manager</div>
              <div class="custom-option" data-value="Dispatcher">Dispatcher</div>
              <div class="custom-option" data-value="Safety Officer">Safety Officer</div>
              <div class="custom-option" data-value="Financial Analyst">Financial Analyst</div>
            </div>
          </div>
          <div class="validation-msg">Role is required</div>
        </div>
        
        <div class="form-actions-row">
          <label class="remember-me">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
