<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drivers - Transit Ops</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .driver-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .driver-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .driver-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .driver-avatar {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      background-color: var(--primary-color);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .driver-info h3 {
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .driver-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }
    .stat-box {
      background: var(--bg-color);
      padding: 12px;
      border-radius: var(--radius-md);
      text-align: center;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .stat-val {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="d-flex items-center gap-2">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <span class="brand-text">Transit Ops</span>
        </div>
        <button class="collapse-btn" id="sidebar-collapse-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
      </div>
      
      <ul class="nav-links">
        <li>
          <a href="dashboard.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="vehicles.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="18" height="8" rx="2" ry="2"></rect><path d="M4 12V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v5"></path><path d="M7 16h1"></path><path d="M16 16h1"></path></svg>
            <span>Vehicles</span>
          </a>
        </li>
        <li>
          <a href="drivers.html" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            <span>Drivers</span>
          </a>
        </li>
        <li>
          <a href="trips.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Trips</span>
          </a>
        </li>
        <li>
          <a href="maintenance.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
            <span>Maintenance</span>
          </a>
        </li>
        <li>
          <a href="expenses.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></svg>
            <span>Fuel & Expenses</span>
          </a>
        </li>
        <li>
          <a href="analytics.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            <span>Analytics</span>
          </a>
        </li>
        <li>
          <a href="settings.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Settings</span>
          </a>
        </li>
      </ul>
      
      <div class="sidebar-footer">
        <div class="user-avatar">RS</div>
        <div class="user-info">
          <div class="user-name">Rahul Sharma</div>
          <div class="user-role" id="role-display">System Admin</div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">Driver Roster</h1>
        </div>
        
        <div class="topbar-right">
          <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="global-search" placeholder="Search drivers...">
            <span class="search-shortcut">Ctrl+K</span>
          </div>
          
                    <div class="notification-wrapper" style="position: relative; margin-right: 8px;">
            <button id="notif-toggle" class="saas-btn saas-btn-icon saas-btn-secondary">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
              <span class="notif-badge" style="display:none; position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: red; border-radius: 50%;"></span>
            </button>
            <div id="notif-dropdown" class="card" style="display: none; position: absolute; top: 100%; right: 0; width: 300px; max-height: 400px; overflow-y: auto; z-index: 1000; margin-top: 8px; padding: 0;">
              <div style="padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-weight: 500;">Notifications</div>
              <div id="notif-list" style="padding: 8px 0;"></div>
            </div>
          </div>
          <button id="theme-toggle" class="saas-btn saas-btn-icon saas-btn-secondary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>
          </button>
        </div>
      </header>

      <!-- Content Canvas -->
      <div class="content-canvas">
        <div class="content-max">
          
          <div class="d-flex justify-between items-center mb-6">
            <div class="d-flex gap-4">
              <input type="text" class="saas-input" placeholder="Filter by name..." style="width: 200px;">
              <select class="saas-input" style="width: 150px;">
                <option>All Statuses</option>
                <option>Available</option>
                <option>On Duty</option>
                <option>Off Duty</option>
              </select>
            </div>
            <button id="create-driver-btn" class="saas-btn saas-btn-primary">+ Add Driver</button>
          </div>

          <!-- Drivers Grid -->
          <div class="driver-grid" id="drivers-grid">
            <!-- Populated by JS -->
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- Dynamic Driver Drawer -->
  <div id="driverModal" class="drawer-backdrop">
    <div class="drawer-panel">
      <div class="drawer-header">
        <h2 id="drawerTitle">Add Driver</h2>
        <button class="saas-btn saas-btn-icon saas-btn-secondary" id="closeDriverModal" style="border: none; background: transparent; box-shadow: none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="drawer-body">
        <form id="driverForm">
          <input type="hidden" id="drv-id">
          
          <div class="form-group mb-4">
            <label class="form-label text-muted" style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; display: block;">Full Name *</label>
            <input type="text" id="drv-name" class="saas-input" style="width: 100%;" placeholder="e.g. Rahul Sharma">
            <span class="error-msg text-danger" style="display:none; font-size: 0.75rem; color: #dc3545; margin-top: 4px;">Required</span>
          </div>

          <div class="form-group mb-4">
            <label class="form-label text-muted" style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; display: block;">License Number *</label>
            <input type="text" id="drv-license" class="saas-input" style="width: 100%;" placeholder="e.g. MH12-2023-1234567">
            <span class="error-msg text-danger" style="display:none; font-size: 0.75rem; color: #dc3545; margin-top: 4px;">Required</span>
          </div>

          <div class="d-flex gap-4 mb-4">
            <div class="form-group" style="flex: 1;">
              <label class="form-label text-muted" style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; display: block;">Contact Number *</label>
              <input type="text" id="drv-phone" class="saas-input" style="width: 100%;" placeholder="e.g. 98765-43210">
              <span class="error-msg text-danger" style="display:none; font-size: 0.75rem; color: #dc3545; margin-top: 4px;">Required</span>
            </div>
            <div class="form-group" style="flex: 1;">
              <label class="form-label text-muted" style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; display: block;">Status</label>
              <select id="drv-status" class="saas-input" style="width: 100%;">
                <option value="Available">Available</option>
                <option value="On Duty">On Duty</option>
                <option value="Off Duty">Off Duty</option>
                <option value="Terminated">Terminated</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="drawer-footer">
        <button type="button" id="submitBtn" class="saas-btn saas-btn-primary" style="width: 100%; justify-content: center;">Save Driver</button>
      </div>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/rbac.js"></script>
  <script src="js/main.js"></script>
  <script src="js/drivers.js"></script>
</body>
</html>
